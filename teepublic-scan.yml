name: Weekly TeePublic Scan
"on":
  schedule:
    - cron: '0 14 * * 1'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Install Chromium
        run: npx playwright install chromium --with-deps

      - name: Run scan
        run: node scraper.js
        env:
          ARTISTS: "Unwound,Duster"

      - name: Email results
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          to: ${{ secrets.EMAIL_TO }}
          from: TeePublic Monitor
          subject: "Weekly TeePublic Scan Results"
          body: |
            Hi,

            Your weekly TeePublic scan is complete. See the attached CSV for all findings.

            Once you've reviewed the CSV, use the DMCA template below to send takedowns to copyright@teepublic.com — just fill in the listing URLs from the CSV and your name/email at the bottom.

            ────────────────────────────────────────────────────────────
            DMCA TAKEDOWN TEMPLATE — copy and send to copyright@teepublic.com
            ────────────────────────────────────────────────────────────

            Subject: DMCA Takedown Notice - Unauthorized The Numero Group LLC Artist Merchandise
            To: copyright@teepublic.com

            To Whom It May Concern,

            I am writing as the authorized representative of The Numero Group LLC, holder of exclusive intellectual property rights for the following artist(s): Unwound, Duster.

            Our monitoring has identified the following unauthorized listings on TeePublic.com that infringe upon our intellectual property:

              * [Listing Title] - [URL]
              * [Listing Title] - [URL]
              * [Listing Title] - [URL]

            These listings use protected intellectual property without authorization, in violation of our rights under the Digital Millennium Copyright Act (17 U.S.C. 512) and applicable trademark law.

            I declare under penalty of perjury that I am authorized to act on behalf of The Numero Group LLC and that this notice is accurate and made in good faith.

            We request that TeePublic immediately:
              1. Remove or disable access to all listed products
              2. Terminate or suspend repeat-infringing seller accounts
              3. Confirm the actions taken via reply to this email

            Rights Holder: The Numero Group LLC
            Website: https://numerogroup.com/
            Authorized Agent: [Your Name]
            Contact Email: [Your Email]
            Address: 2533 S. Troy St, Chicago, IL 60623

            Sincerely,
            [Your Name]
            The Numero Group LLC
            [Your Email]

            ────────────────────────────────────────────────────────────
          attachments: results/*.csv
